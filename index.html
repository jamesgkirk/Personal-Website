  <!-- Critical above-the-fold CSS inlined -->
  <style>
    :root {
      --color-bg: #0e0e0e;
      --color-surface: #161616;
      --color-border: #2a2a2a;
      --color-text: #e8e4dc;
      --color-muted: #7a7570;
      --color-accent: #6e7f80;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui: 'Inter', system-ui, sans-serif;
      --nav-h: 56px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-ui);
      font-weight: 300;
      overflow-x: hidden;
    }
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.25rem, 5vw, 3rem);
      background: transparent;
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .nav__name {
      font-family: 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif; font-weight: 300;
      font-size: 1.05rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--color-text); text-decoration: none;
    }
    .site-hero {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(var(--nav-h) + 3.5rem) clamp(1.25rem, 5vw, 3rem) 3.5rem;
      text-align: center;
    }
    .site-hero__name {
      font-family: 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif; font-weight: 300;
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      letter-spacing: 0.08em; text-align: center; line-height: 1;
      text-transform: uppercase;
    }
  </style>

  <link rel="stylesheet" href="style.css?v=14" />

      <button
        type="button"
        class="credit-modal__close"

        aria-label="Close"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">

        <p class="credit-modal__album" id="modal-album"></p>
        <p class="credit-modal__role" id="modal-role"></p>
        <div class="credit-modal__songs-wrap" id="modal-songs-wrap">
          <ul class="credit-modal__songs" id="modal-songs"></ul>
        </div>
        <div class="credit-modal__spotify-wrap" id="modal-spotify-wrap"></div>
