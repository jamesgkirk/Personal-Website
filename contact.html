<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — James Kirk</title>
  <meta name="description" content="Get in touch with James Kirk — audio engineer." />

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Web fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&family=Montserrat:wght@300&display=swap"
    rel="stylesheet"
  />

  <!-- Critical above-the-fold CSS inlined -->
  <style>
    :root {
      --color-bg: #0e0e0e;
      --color-surface: #161616;
      --color-border: #2a2a2a;
      --color-text: #e8e4dc;
      --color-muted: #7a7570;
      --color-accent: #6e7f80;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui: 'Inter', system-ui, sans-serif;
      --nav-h: 56px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-ui);
      font-weight: 300;
      overflow-x: hidden;
    }
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.25rem, 5vw, 3rem);
      background: rgba(14, 14, 14, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }
    .nav__name {
      font-family: 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif; font-weight: 300;
      font-size: 1.05rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--color-text); text-decoration: none;
    }
    .contact-wrap {
      min-height: 100dvh; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
    }
  </style>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ======================================================
       NAVIGATION
       ====================================================== -->
  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html" class="nav__name" aria-label="Home">James Kirk</a>
    <ul class="nav__links" role="list">
      <li><a href="index.html#credits">Credits</a></li>
      <li><a href="contact.html" aria-current="page">Contact</a></li>
    </ul>
  </nav>

  <!-- ======================================================
       CONTACT
       ====================================================== -->
  <main>
    <section
      class="contact-wrap"
      aria-label="Contact information"
    >
      <h1 class="contact-heading">James Kirk</h1>

      <a
        class="contact-email"
        href="mailto:james@jamesgkirk.com"
        aria-label="Send an email to James Kirk"
      >
        james@jamesgkirk.com
      </a>

      <!-- Instagram -->
      <a
        href="https://www.instagram.com/jamesgkirk/"
        target="_blank"
        rel="noopener noreferrer"
        class="contact-instagram__link"
        aria-label="Instagram @jamesgkirk (opens in new tab)"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="13"
          height="13"
          fill="currentColor"
          aria-hidden="true"
          focusable="false"
        >
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
        @jamesgkirk
      </a>
    </section>
  </main>

  <!-- ======================================================
       FOOTER
       ====================================================== -->
  <footer class="site-footer" aria-label="Site footer">
    <p>
      <span id="footer-year"></span>
      &nbsp;James Kirk. All rights reserved.
    </p>
  </footer>

  <!-- ======================================================
       SCRIPTS
       ====================================================== -->
  <script>
    document.getElementById('footer-year').textContent =
      '\u00A9\u00A0' + new Date().getFullYear();
  </script>

</body>
</html>
